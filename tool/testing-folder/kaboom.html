            // import kaboom.js
            import kaboom from "https://unpkg.com/kaboom@3000.0.1/dist/kaboom.mjs";

            // initialize context
            kaboom();

            const JUMP_FORCE = 800;
            const SPEED = 480;
            const MOVE_SPEED = 800;

            scene("game", () => {

                loadSprite("player", "sprites/stickman.png");
                loadSprite("ground", "sprites/grass-block.png");
                loadSprite("coin", "sprites/goldcoin.jpg");
                loadSprite("flag", "sprites/flag.png");

                setGravity(1600);

                let checkpointPos = vec2(200, 100); // moved up

                const player = add([
                    sprite("player"),
                    area(),
                    body(),
                    scale(0.1),
                    pos(checkpointPos),
                ]);

                addLevel([
                    "                           ",
                    "                           ",
                    "                           ",
                    "            ===            ",
                    "                           ",
                    "                           ",
                    "===========================",
                ], {
                    tileWidth: 100,
                    tileHeight: 160,
                    tiles: {
                        "=": () => [
                            sprite("ground"),
                            area(),
                            scale(.20),
                            body({ isStatic: true }),
                        ],
                    }
                });

                function jump() {
                    if (player.isGrounded()) {
                        player.jump(800);
                    }
                }

                onKeyPress("space", jump);
                onKeyPress("w", jump);

                onKeyDown("a", () => player.move(-800, 0));
                onKeyDown("d", () => player.move(800, 0));

            });

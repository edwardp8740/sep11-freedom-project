<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module">
            // JS

            // import kaboom.js
            import kaboom from "https://unpkg.com/kaboom@3000.0.1/dist/kaboom.mjs";

            // initialize context
            kaboom();

            const JUMP_FORCE = 800;
            const SPEED = 480;
            const MOVE_SPEED = 800;
            const player = add([
                health(3),
            ])

            scene("game", () => {

                loadSprite("player", "sprites/stickman.png");
                loadSprite("ground", "sprites/grass-block.png");
                loadSprite("coin", "sprites/goldcoin.jpg");
                loadSprite("flag", "sprites/checkpoint-flag.png");

                setGravity(1600);

                let checkpointPos = vec2(200, 100); // moved up

                const player = add([
                    sprite("player"),
                    area(),
                    body(),
                    scale(0.1),
                    pos(checkpointPos),
                ]);

                player.onUpdate(() => {
                    camPos(camPos().lerp(player.pos, 0.1));
                });

                addLevel([
                    // "                           ",
                    // "                           ",
                    "                           ",
                    "            ===            ",
                    "                           ",
                    "                           ",
                    "===============================================================",
                ], {
                    tileWidth: 100,
                    tileHeight: 160,
                    tiles: {
                        "=": () => [
                            sprite("ground"),
                            area(),
                            scale(.20),
                            body({ isStatic: true }),
                        ],
                    }
                });

                function jump() {
                    if (player.isGrounded()) {
                        player.jump(JUMP_FORCE);
                    }
                }

                onKeyPress("space", jump);
                onKeyPress("w", jump);

                onKeyDown("a", () => player.move(-400, 0));
                onKeyDown("d", () => player.move(400, 0));

                // Checkpoint object
                const checkpoint = add([
                    sprite("flag"),
                    pos(600, 600), // adjusted so it's visible
                    area(),
                    scale(.2),
                    "checkpoint",
                ])

                player.onCollide("checkpoint", (cp) => {
                    checkpointPos = cp.pos.clone()
                    debug.log("Checkpoint saved!")
                })

                player.onCollide("bad", (bad) => {
                    player.hurt(1)
                    bad.hurt(1)
                })

                player.on("hurt", () => {
                    play("ouch")
                })

                // Death condition
                player.onCollide("death", () => {
                    go("game") // reload scene
                })

            });

            go("game");
        </script>
    </body>
</html>
